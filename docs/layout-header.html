<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Keycraft Layout: {{NAME}}</title>
 <style>
  :root {
   --bg-color: #ffffff;
   --text-color: #333333;
   --pre-bg: #f7f7f7;
   --pre-border: #dddddd;
   --link-color: #007bff;
  }

  @media (prefers-color-scheme: dark) {
   :root {
    --bg-color: #1e1e1e;
    --text-color: #e0e0e0;
    --pre-bg: #262626;
    --pre-border: #444444;
    --link-color: #4da3ff;
   }
  }

  body {
   font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
   background-color: var(--bg-color);
   color: var(--text-color);
   margin: 0;
   padding: 20px;
   line-height: 1.5;
  }

  .container {
   max-width: 100%;
   overflow-x: auto;
   margin: 0 auto;
   box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
   border-radius: 8px;
   padding: 20px;
   box-sizing: border-box;
  }

  h1 {
   font-size: 1.5rem;
   margin: 0 0 16px 0;
   color: var(--link-color);
  }

  .nav {
   margin-bottom: 16px;
  }

  .nav a {
   color: var(--link-color);
   text-decoration: none;
  }

  .nav a:hover {
   text-decoration: underline;
  }

  pre.keycraft-view {
   font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
   line-height: 1.15;
   font-size: 13px;
   overflow-x: auto;
   padding: 16px;
   margin: 0;
   background-color: var(--pre-bg);
   border: 1px solid var(--pre-border);
   border-radius: 6px;
   color: var(--text-color);
  }
 </style>
</head>

<body>
 <div class="container">
  <p class="nav"><a href="../index.html">← Back to ranking</a></p>
  <h1>{{NAME}}</h1>
<pre class="keycraft-view">
